server:
  listen: ":8080"
  read_timeout_sec: 10
  write_timeout_sec: 10

fetch:
  default_interval_sec: 10
  request_timeout_sec: 15
  max_workers: 5
  retry_count: 1

registries:
  - id: reg1
    name: docker-registry
    base_url: https://docker-registry.lab.zverse.space:32443
    username: ${REG1_USERNAME}
    password: ${REG1_PASSWORD}
    enabled: true
    interval_sec: 10
  - id: reg2
    name: ghcr
    base_url: https://ghcr.io
    username: ${GHCR_USERNAME}
    password: ${GHCR_TOKEN}
    enabled: true
    interval_sec: 10
  - id: reg3
    name: acr
    base_url: https://${ACR_INSTANCE}
    username: ${ACR_USERNAME}
    password: ${ACR_PASSWORD}
    enabled: true
    interval_sec: 10
