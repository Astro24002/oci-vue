<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OCI Dashboard Admin</title>
    <link rel="stylesheet" href="/admin/admin.css" />
  </head>
  <body>
    <main class="page">
      <header class="page-header">
        <h1>Registry Management</h1>
        <button id="reloadBtn" type="button">Reload Config</button>
      </header>

      <p id="message" role="status" aria-live="polite"></p>

      <section class="panel">
        <h2>Registries</h2>
        <div class="table-wrap">
          <table id="registryTable">
            <thead>
              <tr>
                <th>ID</th>
                <th>Name</th>
                <th>URL</th>
                <th>Enabled</th>
                <th>Last Sync</th>
                <th>Last Result</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </section>

      <section class="panel">
        <h2>Create / Update Registry</h2>
        <form id="registryForm">
          <div class="grid">
            <label>ID<input name="id" required /></label>
            <label>Name<input name="name" required /></label>
            <label>Base URL<input name="baseUrl" type="url" required /></label>
            <label>Username<input name="username" required /></label>
            <label>Password<input name="password" type="password" required /></label>
            <label>Interval (sec)<input name="intervalSec" type="number" min="1" /></label>
            <label class="checkbox"><input name="enabled" type="checkbox" checked /> Enabled</label>
          </div>
          <div class="actions">
            <button type="submit">Save</button>
          </div>
        </form>
      </section>
    </main>

    <script type="module" src="/admin/admin.js"></script>
  </body>
</html>
